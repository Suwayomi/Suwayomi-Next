<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/logo.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Suwayomi Next</title>
        <script>
            ;(function () {
                try {
                    const theme = localStorage.getItem("next-theme") || "dark"
                    const accent = localStorage.getItem("next-accent-color")
                    if (theme) document.documentElement.className = theme
                    if (accent) {
                        document.documentElement.style.setProperty(
                            "--primary",
                            accent
                        )
                        document.documentElement.style.setProperty(
                            "--ring",
                            accent
                        )
                    }
                } catch (e) {}
            })()
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
